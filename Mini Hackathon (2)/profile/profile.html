<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpHub AI || Profile</title>

    <link rel="stylesheet" href="./profile.css" />
  </head>

  <body data-page="profile">
    <header class="topbar">
      <div class="container nav">
        <a class="brand" href="../home/home.html"
          ><span class="brand-badge">H</span><span>HelpHub AI</span></a
        >
        <nav class="nav-links">
          <a href="../dashboard/dashboard.html">Dashboard</a><a href="../onboarding/onboarding.html">Onboarding</a
          ><a data-nav="profile" href="../profile/profile.html" class="active">Profile</a>
        </nav>
      </div>
    </header>
    <main class="container">
      <section class="page-hero">
        <div class="panel">
          <p class="eyebrow">Profile</p>
          <h1 style="font-size: clamp(2.2rem, 4vw, 4rem)" data-profile-name="">
            Ayesha Khan
          </h1>
          <p>
            <span data-profile-role="">Both</span> •
            <span data-profile-location="">Karachi</span>
          </p>
        </div>
      </section>
      <section class="profile-grid section">
        <div class="stack">
          <div class="panel"  style="height: 465px; margin-bottom: 10px;">
            <p class="section-kicker">Public profile</p>
            <h2>Skills and reputation</h2>
            <div class="metric">
              <span>Trust score</span><strong data-profile-trust="">92%</strong>
            </div>
            <div class="metric">
              <span>Contributions</span
              ><strong data-profile-contributions="">31</strong>
            </div>
            <div class="stack">
              <div>
                <strong>Skills</strong>
                <div
                  class="tag-row"
                  data-profile-skills=""
                  style="margin-top: 10px"
                >
                  <span class="tag">Figma</span><span class="tag">UI/UX</span
                  ><span class="tag">HTML/CSS</span
                  ><span class="tag">Career Guidance</span>
                </div>
              </div>
              <div>
                <strong>Badges</strong>
                <div
                  class="tag-row"
                  data-profile-badges=""
                  style="margin-top: 10px"
                >
                  <span class="tag">Design Ally</span
                  ><span class="tag">Fast Responder</span
                  ><span class="tag">Top Mentor</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <form class="form-card stack" data-profile-form="" style="height: 465px; margin-bottom: 10px;">
          <p class="section-kicker">Edit profile</p>
          <h2>Update your identity</h2>
          <div class="profile-form">
            <div class="field">
              <label>Name</label><input name="name" type="text" value="Ayesha Khan" />
            </div>
            <div class="field">
              <label>Location</label><input name="location" type="text" value="Karachi" />
            </div>
            <div class="field-full">
              <label>Skills</label><br><input style="width: 100%;" name="skills" type="text" value="Figma, UI/UX, HTML/CSS, Career Guidance" />
            </div>
            <div class="field-full">
              <label>Interests</label><br><input style="width: 100%;" name="interests" type="text" value="Hackathons, UI/UX, Community Building" />
            </div>
          </div>
          <button class="btn btn-primary" type="submit" style="margin-top: 10px; width: 100%;">Save profile</button>
        </form>
      </section>
    </main>
  </body>
</html>
